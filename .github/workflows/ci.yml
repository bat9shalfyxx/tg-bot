name: tg-bot | CI/CD pipeline
run-name: ${{ github.actor }}'s CI/CD test is running
on: 
  push:
    branches: ["master"]
  pull_request: 
    branches: ["master"]
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Update Node.js v[${{ matrix.node-version }}]
        uses: actions/setup-node@v6
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      
      - name: Run Biome checks
        run: npm run check:ci

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build